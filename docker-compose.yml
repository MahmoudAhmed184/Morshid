name: morshid

services:
  postgres:
    image: pgvector/pgvector:0.8.4-pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-morshid}
      POSTGRES_USER: ${POSTGRES_USER:-morshid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morshid_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - morshid-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  morshid-postgres-data:
  morshid-pdf-storage:
