name: Sprint 1 CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://morshid:morshid_local_password@localhost:5432/morshid
      REDIS_URL: redis://localhost:6379
      CLIENT_ORIGIN: http://localhost:3000
      AUTH_ACCESS_TOKEN_SECRET: test-access-token-secret-with-at-least-32-characters
      AUTH_REFRESH_TOKEN_HASH_SECRET: test-refresh-token-hash-secret-with-at-least-32-characters
      AUTH_ACCESS_TOKEN_TTL_SECONDS: 900
      AUTH_REFRESH_TOKEN_TTL_DAYS: 7
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run canonical checks
        run: npm run check

      - name: Start infrastructure
        run: npm run infra:up

      - name: Deploy migrations
        run: npm run db:migrate:deploy

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Stop infrastructure
        if: always()
        run: npm run infra:down
