name: Bug
description: Broken behavior or regression.
title: 'bug: '
labels: ['type:bug']
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Include affected role, course boundary, or security risk.
    validations:
      required: true
